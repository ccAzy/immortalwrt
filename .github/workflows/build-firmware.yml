name: Build TR3000

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - README.md

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Clone upstream
        run: |
          git clone --depth 1 --single-branch -b openwrt-24.10-6.6 \
            https://github.com/padavanonly/immortalwrt-mt798x-6.6.git /tmp/src
          cd /tmp/src && echo "cloned"

      - name: Apply TR3000 config
        run: |
          cd /tmp/src
          sed -i "s/192.168.110.1/192.168.6.1/g" package/base-files/files/bin/config_generate
          echo "src-git kenzok8 https://github.com/kenzok8/openwrt-packages.git" >> feeds.conf.default
          echo "src-git kenzok8_small https://github.com/kenzok8/small.git" >> feeds.conf.default
          cat >> defconfig/mt7981-ax3000.config << 'PKGEOF'
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_dns2socks=y
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_ipt2socks=y
          CONFIG_PACKAGE_adguardhome=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-app-ksmbd=y
          CONFIG_PACKAGE_wsdd2=y
          CONFIG_PACKAGE_luci-app-wol=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_mtr-json=y
          CONFIG_PACKAGE_tcping=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          PKGEOF
          mkdir -p files/etc
          echo "net.ipv4.tcp_congestion_control=bbr" > files/etc/sysctl.conf
          echo "net.netfilter.nf_conntrack_max=65536" >> files/etc/sysctl.conf

      - name: Verify device name
        run: |
          cd /tmp/src
          if grep -q "cudy_tr3000" target/linux/mediatek/filogic/image/mediatek.mk; then
            echo "✅ Device found"
          else
            echo "⚠️ Listing available devices:"
            grep "define Device" target/linux/mediatek/filogic/image/mediatek.mk | head -10 || true
          fi

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses-dev libssl-dev rsync unzip \
            zlib1g-dev file wget python3 zstd

      - name: Install Rust (OpenClash build dep)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android 2>/dev/null
          df -h

      - name: Build
        run: |
          cd /tmp/src
          ./scripts/feeds update -a && ./scripts/feeds install -a
          cp defconfig/mt7981-ax3000.config .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_cudy_tr3000-v1-ubootmod=y" >> .config
          make defconfig
          make prereq
          echo "📥 Downloading packages (retry 3x)..."
          for i in {1..3}; do make -j4 download V=s && break || sleep 30; done
          echo "=== Resources ===" && free -h && nproc && df -h
          echo "🚀 Building..."
          make -j$(nproc) V=s || make -j1 V=s

      - name: Show build errors
        if: failure()
        run: |
          cd /tmp/src
          echo "=== Last 200 lines of compile log ==="
          tail -200 logs/compile.log 2>/dev/null || echo "Check Actions console"
          df -h

      - name: Collect
        if: success()
        run: |
          mkdir -p /tmp/out
          if cp /tmp/src/bin/targets/mediatek/filogic/*cudy* /tmp/out/ 2>/dev/null; then
            echo "✅ Collected"
            ls -lh /tmp/out/
          else
            echo "❌ No firmware!"
            exit 1
          fi

      - name: Generate release info
        if: success()
        run: |
          echo "BUILD_TIME=$(date '+%Y%m%d-%H%M%S')" >> $GITHUB_ENV
          echo "BUILD_NUM=${{ github.run_number }}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: tr3000-firmware-${{ env.BUILD_TIME }}
          path: /tmp/out/*

      - uses: softprops/action-gh-release@v3
        if: success()
        with:
          tag_name: tr3000-${{ env.BUILD_TIME }}
          name: TR3000 Build #${{ env.BUILD_NUM }}
          body: |
            **构建信息**
            - 编号: ${{ github.run_number }}
            - 触发: ${{ github.event_name }}
            - 提交: ${{ github.sha }}
            - 时间: ${{ env.BUILD_TIME }}
          files: /tmp/out/*
