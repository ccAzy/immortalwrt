name: Build Cudy TR3000 Firmware

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget \
            python3

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        run: |
          cat > .config << 'EOF'
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_cudy_tr3000-v1-ubootmod=y
CONFIG_DEVEL=y
CONFIG_AUTOREMOVE=y
CONFIG_CCACHE=y
CONFIG_BUILD_LOG=y
CONFIG_TARGET_ROOTFS_SQUASHFS=y
EOF
          make defconfig

      - name: Download sources
        run: make -j$(nproc) download V=s

      - name: Compile
        run: make -j$(nproc) V=s || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cudy-tr3000-firmware
          path: bin/targets/mediatek/filogic/*sysupgrade*
