name: Build TR3000
on:
  workflow_dispatch:
  push:
    paths-ignore: ['README.md']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile:
          - cudy_tr3000-v1-ubootmod
          - cudy_tr3000-v1
          - cudy_tr3000-256mb-v1
    steps:
      - uses: actions/checkout@v4

      - name: Download build cache
        run: |
          mkdir -p staging_dir build_dir .ccache
          CACHE_URL="https://github.com/ccAzy/immortalwrt/releases/download/tr3000-cache/immortalwrt-build-cache.tar.zst"
          if curl -sIf "$CACHE_URL" 2>/dev/null | head -1 | grep -q "302"; then
            echo "Cache found"
            cd / && wget -q -O /tmp/cache.tar.zst "$CACHE_URL"
            tar -I zstd -xf /tmp/cache.tar.zst -C "$GITHUB_WORKSPACE/"
            rm /tmp/cache.tar.zst
          else
            echo "No cache, downloading toolchain"
            mkdir -p staging_dir
            wget -q -O /tmp/tc.tar.zst \
              https://downloads.immortalwrt.org/releases/24.10-SNAPSHOT/targets/mediatek/filogic/immortalwrt-toolchain-24.10-SNAPSHOT-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            tar -I zstd -xf /tmp/tc.tar.zst -C staging_dir/ --strip-components=1
            rm /tmp/tc.tar.zst
          fi

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget python3 zstd

      - name: Add custom files
        run: |
          mkdir -p files/etc/init.d files/etc/uci-defaults
          echo 'net.ipv4.tcp_congestion_control=bbr' > files/etc/sysctl.conf
          echo 'net.core.default_qdisc=fq_codel' >> files/etc/sysctl.conf
          echo 'net.netfilter.nf_conntrack_max=65536' >> files/etc/sysctl.conf
          echo 'net.ipv4.tcp_keepalive_time=120' >> files/etc/sysctl.conf
          echo 'net.ipv4.tcp_tw_reuse=1' >> files/etc/sysctl.conf
          cat > files/etc/firewall.user << 'FEOF'
          iptables -F FORWARD
          iptables -t nat -F POSTROUTING
          iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          iptables -A FORWARD -i br-lan -o eth0 -j ACCEPT
          iptables -A FORWARD -i eth0 -o br-lan -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          FEOF
          cat > files/etc/init.d/nat-fix << 'IEOF'
          #!/bin/sh /etc/rc.common
          START=10
          start() { /etc/firewall.user; }
          boot()  { /etc/firewall.user; }
          IEOF
          chmod +x files/etc/init.d/nat-fix
          cat > files/etc/uci-defaults/99-custom.sh << 'UEOF'
          #!/bin/sh
          chmod +x /etc/init.d/nat-fix
          /etc/init.d/nat-fix enable
          exit 0
          UEOF
          chmod +x files/etc/uci-defaults/99-custom.sh

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Gen config
        run: |
          cp .github/seed.config .config
          make defconfig

      - name: Download sources
        run: make -j$(nproc) download V=s

      - name: Compile
        run: make -j$(nproc) V=s || make -j1 V=s

      - name: Build image
        run: |
          mkdir -p /tmp/out
          make image PROFILE=${{ matrix.profile }}
          cp bin/targets/mediatek/filogic/*sysupgrade* /tmp/out/ 2>/dev/null || true
          echo "Profile: ${{ matrix.profile }}"
          ls -lh /tmp/out/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: tr3000-${{ matrix.profile }}
          path: /tmp/out/*

      - name: Release firmware
        uses: softprops/action-gh-release@v3
        if: success()
        with:
          tag_name: tr3000-autobuild
          name: TR3000 AutoBuild
          files: /tmp/out/*
          token: ${{ secrets.GITHUB_TOKEN }}

  # === 包源发布 ===
  publish-packages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build package repo
        run: |
          mkdir -p /tmp/packages
          for f in artifacts/tr3000-*/*sysupgrade*; do cp "$f" /tmp/packages/ 2>/dev/null || true; done
          cat > /tmp/packages/README.md << 'EOF'
          # TR3000 固件包源
          以下固件来自 immortalwrt 源码编译 (BBRv3+XDP+Fullcone+OpenClash):
          - cudy_tr3000-v1-ubootmod: ITB (ubootmod分区)
          - cudy_tr3000-v1: BIN (原厂分区)
          - cudy_tr3000-256mb-v1: BIN (256MB版本)
          EOF

      - name: Publish packages
        uses: softprops/action-gh-release@v3
        if: success()
        with:
          tag_name: tr3000-packages
          name: TR3000 Packages
          body: "三版本固件包集合"
          files: /tmp/packages/*
          token: ${{ secrets.GITHUB_TOKEN }}

  # === 缓存发布（只跑一次）===
  publish-cache:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Quick check
        run: echo "Cache uploaded by build job when seed changes"
