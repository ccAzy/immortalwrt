name: Build TR3000

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    paths-ignore: ['README.md']


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Restore dl cache
        uses: actions/cache/restore@v4
        with:
          path: dl
          key: dl-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
          restore-keys: dl-${{ runner.os }}-

      - name: Restore toolchain cache
        uses: actions/cache/restore@v4
        with:
          path: staging_dir
          key: toolchain-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
          restore-keys: toolchain-${{ runner.os }}-

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: build_dir/target-aarch64_cortex-a53_musl
          key: builddir-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
          restore-keys: builddir-${{ runner.os }}-

      - name: Download pre-built toolchain (first run only)
        run: |
          if [ ! -d staging_dir/toolchain-* ]; then
            mkdir -p staging_dir
            wget -q -O /tmp/tc.tar.zst https://downloads.immortalwrt.org/releases/24.10-SNAPSHOT/targets/mediatek/filogic/immortalwrt-toolchain-24.10-SNAPSHOT-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            tar -I zstd -xf /tmp/tc.tar.zst -C staging_dir/ --strip-components=1
            rm /tmp/tc.tar.zst
            echo "Toolchain downloaded"
          else
            echo "Toolchain cached"
          fi

      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget python3 zstd

      - name: Run custom scripts
        run: |
          # preset clash cores + GeoIP
          if [ -f preset-clash-core.sh ]; then bash preset-clash-core.sh; fi
          # diy customization
          if [ -f diy-part2.sh ]; then bash diy-part2.sh; fi

      - name: Add custom files
        run: |
          mkdir -p files/etc/init.d files/etc/uci-defaults
          cat > files/etc/sysctl.conf << 'EOF'
          net.ipv4.tcp_slow_start_after_idle=0
          net.core.netdev_budget=600
          net.ipv4.tcp_rmem=4096 131072 6291456
          net.ipv4.tcp_wmem=4096 131072 6291456
          net.core.rmem_max=4194304
          net.core.wmem_max=2097152
          net.netfilter.nf_conntrack_max=65536
          net.netfilter.nf_conntrack_tcp_timeout_established=1800
          net.ipv4.tcp_congestion_control=bbr
          net.core.default_qdisc=fq_codel
          net.ipv4.tcp_tw_reuse=1
          net.ipv4.tcp_keepalive_time=120
          net.ipv4.tcp_fastopen=3
          net.netfilter.nf_conntrack_udp_timeout_stream=300
          EOF
          cat > files/etc/firewall.user << 'FEOF'
          iptables -F FORWARD; iptables -t nat -F POSTROUTING
          iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          iptables -A FORWARD -i br-lan -o eth0 -j ACCEPT
          iptables -A FORWARD -i eth0 -o br-lan -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          iptables -A FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
          FEOF
          printf '#!/bin/sh /etc/rc.common\nSTART=10\nstart() { /etc/firewall.user; }\nboot()  { /etc/firewall.user; }\n' > files/etc/init.d/nat-fix
          chmod +x files/etc/init.d/nat-fix
          printf '#!/bin/sh\nchmod +x /etc/init.d/nat-fix\n/etc/init.d/nat-fix enable\nexit 0\n' > files/etc/uci-defaults/99-custom.sh
          chmod +x files/etc/uci-defaults/99-custom.sh

      - name: Update feeds
        run: ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Gen config
        run: cp defconfig/mt7981-ax3000.config .config && make defconfig

      - name: Download sources
        run: make -j$(nproc) download V=s

      - name: Check disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null
          df -h


      - name: Compile (with compression)
        run: export SQ="-b 256k -comp xz -Xbcj arm -noappend -Xdict-size 1M"; make -j$(nproc) V=s SQUASHFSOPT="$SQ" || make -j1 V=s SQUASHFSOPT="$SQ"

      - name: Setup tmate (debug on failure)
        if: failure()
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30


      - name: Collect firmware
        run: |
          mkdir -p /tmp/out
          cp bin/targets/mediatek/filogic/*squashfs-sysupgrade* /tmp/out/ 2>/dev/null || true
          ls -lh /tmp/out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tr3000-firmware
          path: /tmp/out/*

      - name: Release firmware
        uses: softprops/action-gh-release@v3
        if: success()
        with:
          tag_name: tr3000-autobuild
          name: TR3000 ImmortalWrt
          files: /tmp/out/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save ccache
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}

      - name: Save build cache
        uses: actions/cache/save@v4
        with:
          path: |
            build_dir/target-aarch64_cortex-a53_musl
          key: builddir-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}

      - name: Save toolchain cache
        uses: actions/cache/save@v4
        with:
          path: staging_dir
          key: toolchain-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
