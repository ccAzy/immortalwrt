name: Build TR3000
permissions: {contents: write}
on: {workflow_dispatch: {}, push: {paths-ignore: [README.md]}}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone upstream
        run: git clone --depth 1 --single-branch -b openwrt-24.10-6.6 https://github.com/padavanonly/immortalwrt-mt798x-6.6.git /tmp/src && cd /tmp/src && echo cloned

      - name: Apply TR3000 config
        run: |
          cd /tmp/src
          sed -i "s/192.168.110.1/192.168.6.1/g" package/base-files/files/bin/config_generate
          cat >> defconfig/mt7981-ax3000.config << 'PKGEOF'
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_dns2socks=y
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_ipt2socks=y
          CONFIG_PACKAGE_adguardhome=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-app-ksmbd=y
          CONFIG_PACKAGE_wsdd2=y
          CONFIG_PACKAGE_luci-app-wol=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_mtr-json=y
          CONFIG_PACKAGE_tcping=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          PKGEOF
          mkdir -p files/etc
          echo "net.ipv4.tcp_congestion_control=bbr" > files/etc/sysctl.conf
          echo "net.netfilter.nf_conntrack_max=65536" >> files/etc/sysctl.conf

      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget python3 zstd

      - name: Build
        run: |
          cd /tmp/src
          cp defconfig/mt7981-ax3000.config .config
          ./scripts/feeds update -a && ./scripts/feeds install -a
          make defconfig
          make -j$(nproc) download V=s
          make -j$(nproc) V=s || make -j1 V=s

      - name: Collect
        run: mkdir -p /tmp/out && cp /tmp/src/bin/targets/mediatek/filogic/*cudy* /tmp/out/ 2>/dev/null; ls -lh /tmp/out/

      - uses: actions/upload-artifact@v4
        with: {name: tr3000-firmware, path: /tmp/out/*}

      - uses: softprops/action-gh-release@v3
        if: success()
        with: {tag_name: tr3000-padavanonly, name: TR3000, files: /tmp/out/*}
