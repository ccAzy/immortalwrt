name: Build TR3000
permissions:
  contents: write
on:
  workflow_dispatch:
  push:
    paths-ignore: ['README.md']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix permissions
        run: |
          find . -type f ( -name "*.sh" -o -name "*.pl" -o -name "config.guess" -o -name "config.sub" -o -name "feeds" ) -exec chmod +x {} + 2>/dev/null
          chmod -R +x scripts/ 2>/dev/null
          echo OK


      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Restore dl cache
        uses: actions/cache/restore@v4
        with:
          path: dl
          key: dl-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
          restore-keys: dl-${{ runner.os }}-

      - name: Restore toolchain cache
        uses: actions/cache/restore@v4
        with:
          path: staging_dir
          key: toolchain-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
          restore-keys: toolchain-${{ runner.os }}-

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: build_dir/target-aarch64_cortex-a53_musl
          key: builddir-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
          restore-keys: builddir-${{ runner.os }}-

      - name: Cleanup before build
        run: sudo apt-get clean; sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null; df -h

      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget python3 zstd

      - name: Add custom files
        run: |
          mkdir -p files/etc/init.d files/etc/uci-defaults
          echo "net.ipv4.tcp_congestion_control=bbr" > files/etc/sysctl.conf
          echo "net.netfilter.nf_conntrack_max=65536" >> files/etc/sysctl.conf
          echo "net.ipv4.tcp_keepalive_time=120" >> files/etc/sysctl.conf
          echo "net.ipv4.tcp_tw_reuse=1" >> files/etc/sysctl.conf
          echo "net.ipv4.tcp_fastopen=3" >> files/etc/sysctl.conf


      - name: Update feeds
        run: ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Gen config
        run: cp defconfig/mt7981-ax3000.config .config && make defconfig

      - name: Download sources
        run: make -j$(nproc) download V=s

      - name: Compile
        run: make -j$(nproc) V=s SQUASHFSOPT="-b 256k -comp xz -Xbcj arm -noappend -Xdict-size 1M" || make -j1 V=s

      - name: Collect firmware
        run: |
          mkdir -p /tmp/out
          cp bin/targets/mediatek/filogic/*squashfs-sysupgrade* /tmp/out/ 2>/dev/null || true
          ls -lh /tmp/out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tr3000-firmware
          path: /tmp/out/*

      - name: Release firmware
        uses: softprops/action-gh-release@v3
        if: success()
        with:
          tag_name: tr3000-autobuild
          name: TR3000 ImmortalWrt
          files: /tmp/out/*

      - name: Save ccache
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}

      - name: Save build cache
        uses: actions/cache/save@v4
        with:
          path: build_dir/target-aarch64_cortex-a53_musl
          key: builddir-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}

      - name: Save toolchain cache
        uses: actions/cache/save@v4
        with:
          path: staging_dir
          key: toolchain-${{ runner.os }}-${{ hashFiles('defconfig/mt7981-ax3000.config') }}
