name: Build TR3000
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget python3
      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Gen config
        run: |
          cp .github/seed.config .config
          make defconfig
      - name: Download sources
        run: make -j$(nproc) download V=s
      - name: Compile
        run: make -j$(nproc) V=s || make -j1 V=s
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tr3000-firmware
          path: bin/targets/mediatek/filogic/*sysupgrade*
